name: Build sing-box minimal

on:
  push:
    paths: [".github/workflows/build-sing-box.yml"]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: mipsle
            goarch: mipsle
            gomips: softfloat
          - name: mips
            goarch: mips
            gomips: softfloat
          - name: armv7
            goarch: arm
            goarm: "7"
          - name: arm64
            goarch: arm64
          - name: amd64
            goarch: amd64

    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Checkout sing-box
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: v1.11.6

      - name: Build (${{ matrix.name }})
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOMIPS: ${{ matrix.gomips }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          go build -v -trimpath -ldflags="-s -w" \
            -tags "with_vless,with_reality,with_utls,with_tproxy,with_dns" \
            -o sing-box-${{ matrix.name }} \
            ./cmd/sing-box 2>&1 || {
              echo "Tagged build failed, trying full build..."
              go build -trimpath -ldflags="-s -w" \
                -o sing-box-${{ matrix.name }} \
                ./cmd/sing-box
            }
          echo "Binary size:"
          ls -lh sing-box-${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: sing-box-${{ matrix.name }}
          path: sing-box-${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: sing-box-*
          merge-multiple: true
          path: binaries

      - name: Show binaries
        run: ls -lh binaries/

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          name: "sing-box minimal"
          tag_name: "sing-box"
          body: "Minimal sing-box build (VLESS Reality + TPROXY + DNS only). ~5-6MB per arch."
          files: binaries/sing-box-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
