name: Build sing-box + UPX

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: mipsle
            goarch: mipsle
            gomips: softfloat
          - name: mips
            goarch: mips
            gomips: softfloat
          - name: armv7
            goarch: arm
            goarm: "7"
          - name: arm64
            goarch: arm64
          - name: amd64
            goarch: amd64

    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Checkout sing-box
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: v1.11.6

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOMIPS: ${{ matrix.gomips }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          go build -v -trimpath -ldflags="-s -w" \
            -o sing-box-${{ matrix.name }} \
            ./cmd/sing-box 2>&1 | tail -5
          ls -lh sing-box-${{ matrix.name }}

      - name: UPX
        run: |
          set -e
          echo "--- Downloading UPX ---"
          curl -sSLo upx.tar.xz https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-amd64_linux.tar.xz
          tar -xf upx.tar.xz
          echo "--- UPX version ---"
          ./upx-4.2.4-amd64_linux/upx --version
          echo "--- Before UPX ---"
          ls -lh sing-box-${{ matrix.name }}
          echo "--- Compressing ---"
          ./upx-4.2.4-amd64_linux/upx --best --lzma sing-box-${{ matrix.name }}
          echo "--- After UPX ---"
          ls -lh sing-box-${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: sing-box-${{ matrix.name }}
          path: sing-box-${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: sing-box-*
          merge-multiple: true
          path: binaries

      - run: ls -lh binaries/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: "sing-box minimal (UPX)"
          tag_name: "sing-box"
          body: "sing-box v1.11.6 with UPX compression."
          files: binaries/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
